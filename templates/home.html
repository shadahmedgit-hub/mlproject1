<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container{
            width: 50%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #333;
        }

        label{
            font-weight: bold;
        }

        input,
        select{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button{
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

        .prediction{
            text-align: center;
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: green;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Student Math Score Prediction</h1>

    <form action="/predictdata" method="post">

        <label>Gender</label>
        <select name="gender" required>
            <option selected disabled value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Race / Ethnicity</label>
        <select name="race_ethnicity" required>
            <option selected disabled value="">Select Group</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <label>Parental Level of Education</label>
        <select name="parental_level_of_education" required>
            <option selected disabled value="">Select Education</option>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master's Degree</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
        </select>

        <label>Lunch Type</label>
        <select name="lunch" required>
            <option selected disabled value="">Select Lunch</option>
            <option value="standard">Standard</option>
            <option value="free/reduced">Free/Reduced</option>
        </select>

        <label>Test Preparation Course</label>
        <select name="test_preparation_course" required>
            <option selected disabled value="">Select Course Status</option>
            <option value="completed">Completed</option>
            <option value="none">None</option>
        </select>

        <label>Reading Score</label>
        <input
            type="number"
            name="reading_score"
            min="0"
            max="100"
            required
        >

        <label>Writing Score</label>
        <input
            type="number"
            name="writing_score"
            min="0"
            max="100"
            required
        >

        <button type="submit">
            Predict Math Score
        </button>

    </form>

    <div class="prediction">
        {{ results }}
    </div>

</div>

</body>
</html>
